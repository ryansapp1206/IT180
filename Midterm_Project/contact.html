<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Ryan Sapp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Get In Touch</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Interests & Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-intro">
            <h2>Send a Message</h2>
            <p>
                Have a question about my work or want to collaborate on a project? 
                Please fill out the form below, and I will get back to you as soon as possible.
            </p>
        </section>

        <section id="form-container">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="user-name">Full Name:</label>
                    <input type="text" id="user-name" name="user-name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="user-email">Email Address:</label>
                    <input type="email" id="user-email" name="user-email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="user-message">Your Message:</label>
                    <textarea id="user-message" name="user-message" rows="5" placeholder="How can I help you?"></textarea>
                </div>

                <div class="form-button">
                    <input type="submit" value="Send Message">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ryan Sapp. All rights reserved.</p>
    </footer>

</body>
</html>
