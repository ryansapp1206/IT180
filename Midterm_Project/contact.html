<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me | Ryan Sapp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Get In Touch</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projectsinterests.html">Interests & Projects</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-intro">
            <h2>Send a Message</h2>
            <p>
                Have a question about my work?
                Please fill out the form below, and I will get back to you as soon as possible.

                <br>
                <br>

                THIS IS NOT CURRENTLY FUNCTIONAL
            </p>
        </section>

        <section id="form-container">
            <form action="mailto:" method="post">
        
                <p>
                    <label for="user-name">Full Name:</label><br>
                    <input type="text" id="user-name" name="user-name" value="Enter name here" required>
                </p>

                <p>
                    <label for="user-email">Email Address:</label><br>
                    <input type="email" id="user-email" name="user-email" value="Enter email here" required>
                </p>

                <p>
                    <label for="user-message">Your Message:</label><br>
                    <textarea id="user-message" name="user-message" rows="8">Enter message here</textarea>
                </p>

                    <input type="submit" value="Send Message">
        
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ryan Sapp</p>
    </footer>

</body>
</html>
