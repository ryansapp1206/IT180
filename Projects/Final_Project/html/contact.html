<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Ryan Sapp</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <script src="../javascript/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Get In Touch</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projectsinterests.html">Projects</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><button id="theme-toggle">Dark Mode</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contact-intro">
            <h2>Send a Professional Inquiry</h2>
            <p>Interested in collaborating or reviewing my resume in further detail? Please fill out the form below.</p>
        </section>
        <section>
            <form id="contact-form" action="mailto:ryan.sapp1206@gmail.com" method="post">
                <div>
                    <label for="user-name">Full Name:</label>
                    <input type="text" id="user-name" name="user-name" placeholder="John Doe" required>
                </div>
                <div>
                    <label for="user-email">Email Address:</label>
                    <input type="email" id="user-email" name="user-email" placeholder="john@example.com" required>
                </div>
                <div>
                    <label for="user-message">Your Message:</label>
                    <textarea id="user-message" name="user-message" rows="6" placeholder="How can I help you?" required></textarea>
                </div>
                <input type="submit" value="Send Message">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ryan Sapp</p>
    </footer>
</body>
</html>
