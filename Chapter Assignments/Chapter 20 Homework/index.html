<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Transitions, Transforms & Animation</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <!-- Part 1: transition button -->
        <section class="demo">
            <h2>Part 1 — Transitions</h2>
            <button class="smooth-btn">Hover over me</button>
        </section>
        <!-- Part 2: transform gallery -->
        <section class="demo">
            <h2>Part 2 — Transforms</h2>
            <div class="box rotate-box">rotate</div>
            <div class="box translate-box">translate</div>
            <div class="box scale-box">scale</div>
            <div class="box skew-box">skew</div>
            <div class="box combo-box">combo</div>
        </section>
        <!-- Part 3: animated card -->
        <section class="demo">
            <h2>Part 3 — Transitions + Transforms</h2>
            <div class="card">Hover me</div>
        </section>
        <!-- Part 4: keyframe animation -->
        <section class="demo">
            <h2>Part 4 — Keyframe Animation</h2>
            <div class="magic-box">Magic!</div>
        </section>
    </body>
</html>
