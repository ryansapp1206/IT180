  body {
     background-color: #0f0f0f;
     display: flex;
     justify-content: center;
     align-items: center;
     height: 100vh;
     margin: 0;
   }

   #graphics-card {
     cursor: pointer;
     transition: transform 0.3s ease, filter 0.3s ease;
   }

   #graphics-card:hover {
     transform: translateY(-4px);
     filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.05)) brightness(1.1);
   }

 </style>

</head>

<body>

    <defs>
     <linearGradient id="hub-metal" x1="0" y1="0" x2="0" y2="1">
       <stop offset="0%" stop-color="#ffffff"/>
       <stop offset="100%" stop-color="#444444"/>
     </linearGradient>
   </defs>

   <g id="graphics-card">
     
     <!-- Black Card Body -->
     <rect x="130" y="30" width="540" height="240" rx="15" fill="#080808" />
     
     <!-- Left Shadow Base -->
     <polygon points="130,30 350,30 400,150 350,270 130,270" 
              fill="none" stroke="#333333" stroke-width="16" stroke-linejoin="round"/>
     <!-- Left Highlight Trim -->
     <polygon points="130,30 350,30 400,150 350,270 130,270" 
              fill="none" stroke="#cccccc" stroke-width="4" stroke-linejoin="round"/>
              
     <!-- Right Shadow Base -->
     <polygon points="670,30 450,30 400,150 450,270 670,270" 
              fill="none" stroke="#333333" stroke-width="16" stroke-linejoin="round"/>
     <!-- Right  Highlight Trim -->
     <polygon points="670,30 450,30 400,150 450,270 670,270" 
              fill="none" stroke="#cccccc" stroke-width="4" stroke-linejoin="round"/>

     <!-- Left Fan -->
     <g id="front-fan">
       <circle cx="245" cy="150" r="95" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="2"/>
       
       <g stroke="#151515" stroke-width="24">
         <line x1="165" y1="150" x2="325" y2="150" /> <!-- Horizontal -->
         <line x1="245" y1="70" x2="245" y2="230" /> <!-- Vertical -->
         <line x1="188" y1="93" x2="302" y2="207" /> <!-- Diagonal -->
         <line x1="188" y1="207" x2="302" y2="93" /> <!-- Diagonal -->
       </g>
       
       <circle cx="245" cy="150" r="24" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
       <circle cx="245" cy="150" r="14" fill="url(#hub-metal)"/>
     </g>

     <!-- Solid block with Text for model name -->
     <text x="555" y="162" font-size="26" fill="#dddddd" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">
       RTX 3080 Ti
     </text>

   </g>

   <!-- Project Name -->
   <text x="20" y="330" font-size="12" fill="#555" font-family="Arial, sans-serif">
     Ryan Sapp - 3080 Ti FE
   </text>

 </svg>

 </svg>
