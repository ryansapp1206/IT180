  body {
     background-color: #0f0f0f;
     display: flex;
     justify-content: center;
     align-items: center;
     height: 100vh;
     margin: 0;
   }

   #graphics-card {
     cursor: pointer;
     transition: transform 0.3s ease, filter 0.3s ease;
   }

   #graphics-card:hover {
     transform: translateY(-4px);
     filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.05)) brightness(1.1);
   }

 </style>

<body>

 <svg viewBox="0 0 800 350" width="800" height="350" xmlns="http://www.w3.org/2000/svg"

    <!-- a simple house made of grouped shapes -->

    <!-- <g id="house">
    <rect x="140" y="180" width="120" height="80" fill="#D2691E"/>

    <polygon points="130,180 200,120 270,180" fill="#8B0000"/>

    <!-- ---------------------------------------------------------------------------- -->

    <defs>
      <linearGradient id="gunmetal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#999999"/>
        <stop offset="25%" stop-color="#e6e6e6"/>
        <stop offset="50%" stop-color="#555555"/>
        <stop offset="75%" stop-color="#cccccc"/>
        <stop offset="100%" stop-color="#444444"/>
      </linearGradient>
    </defs>

    <g id="graphics-card">
      
      <!-- Background Solid Black Card Body -->
      <rect x="120" y="20" width="560" height="260" rx="35" fill="#050505" />
      
      <!-- Left Loop Thing -->
      <path d="M 400 150 L 350 30 L 160 30 A 30 30 0 0 0 130 60 L 130 240 A 30 30 0 0 0 160 270 L 350 270 Z" 
            fill="none" stroke="url(#gunmetal)" stroke-width="14" stroke-linejoin="round"/>
            
      <!-- Right Loop Thing -->
      <path d="M 400 150 L 450 30 L 640 30 A 30 30 0 0 1 670 60 L 670 240 A 30 30 0 0 1 640 270 L 450 270 Z" 
            fill="none" stroke="url(#gunmetal)" stroke-width="14" stroke-linejoin="round"/>

      <!-- Left Fan -->
      <g id="front-fan">
        <!-- Outer Fan Casing -->
        <circle cx="245" cy="150" r="95" fill="#080808" stroke="#111" stroke-width="2"/>
        
        <!-- Fan Blades using dasharray -->
        <circle cx="245" cy="150" r="50" fill="none" stroke="#151515" stroke-width="80" stroke-dasharray="16, 6"/>
        
        <!-- Metallic Center Area -->
        <circle cx="245" cy="150" r="22" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
        <circle cx="245" cy="150" r="14" fill="url(#gunmetal)"/>
      </g>

      <!-- Solid block with Text for model name -->
      <text x="555" y="162" font-size="26" fill="url(#gunmetal)" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">
        RTX 3080 Ti
      </text>
    </g>

    <!-- Project Name -->
    <text x="20" y="330" font-size="12" fill="#555" font-family="Arial, sans-serif">
      Ryan Sapp - 3080 Ti FE
    </text>

 </svg>
