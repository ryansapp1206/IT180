    <title>Chapter 21 Part 2 Assignment</title>
    
    <body>
        <h1 id="greeting"></h1>
        <p id="intro"></p>
        <p id="total"></p>

        <script>   
            //initialize a constant containing my name and a constant containing my favorite number
            const NAME = "Ryan";
            const FAVORITENUMBER = 14;

            document.querySelector("#greeting").innerText = "Hello! My name is " + NAME + ".";
            document.querySelector("#intro").innerText = "My favorite number is " + FAVORITENUMBER + ".";
        
            let favNumSquared = FAVORITENUMBER * FAVORITENUMBER;
            document.querySelector("#total").innerText = "My favorite number squared is " + favNumSquared + ".";
        </script>
